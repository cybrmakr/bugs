<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Private Bug Bounty Hub</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #111620;
  --text: #e8eef6;
  --muted: #b2c2d6;
  --brand: #7c5cff;
  --brand-2: #00d1b2;
  --accent: #ffb454;
  --danger: #ff5d5d;
  --ok: #36d399;
  --focus: #5ad1ff;
  --radius: 16px;
  --shadow: 0 10px 30px rgba(0, 0, 0, .35);
  --shadow-sm: 0 6px 16px rgba(0, 0, 0, .25);
  --maxw: 1100px;
}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui;
  background: linear-gradient(180deg, var(--bg), #0b0f14 60%);
  color: var(--text);
}

.container { max-width:var(--maxw); margin:0 auto; padding:20px; }
.card{ background:var(--panel); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
.grid{ display:grid; gap:14px; margin-top:26px; }
@media(min-width:900px){ .grid{ grid-template-columns: repeat(2,1fr); } }

.program { display:flex; gap:14px; align-items:flex-start; padding:14px; border-radius:12px; }
.avatar {
  width:56px; height:56px; border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff;
}

.status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }
.status-active { background:var(--ok); }
.status-open { background:var(--accent); }
.status-paused { background:var(--danger); }

.small { padding:8px 10px; border-radius:999px; font-weight:700; font-size:13px; cursor:pointer; border:0; }
.outline { border:1px solid rgba(255,255,255,0.15); background:transparent; color:var(--text); }
.danger { background: linear-gradient(135deg,var(--danger),#ff7b7b); color:#fff; }

.details { margin-top:10px; color:var(--muted); font-size:14px; display:none; }
.details.open { display:block; }

.premium-badge {
  margin-left:8px;
  font-size:11px;
  font-weight:800;
  padding:3px 8px;
  border-radius:999px;
  background:linear-gradient(135deg,gold,orange);
  color:#000;
}
</style>
</head>

<body>

<main class="container">
  <h1>Private Bug Bounty</h1>
  <div class="grid" id="programs"></div>
</main>

<script>

/* ===== Programs ===== */

const programs = [

{
  id: "questnet",
  name: "Questnet GmbH",
  description: "IP-Infrastructure incl. Webapp",
  assets: "https://live-manager.de, 185.158.96.0/22",
  status: "active",
  premium: true,
  notes: "No social engineering. No DDoS."
},

{
  id: "localiza",
  name: "Localiza Rent a Car",
  description: "International car rental.",
  assets: "*.localiza.com",
  status: "open",
  notes: "No social engineering. No DDoS."
},

{
  id: "jims-group",
  name: "Jim's Group",
  description: "Franchising family.",
  assets: "jims.net",
  status: "open",
  notes: "No social engineering. No DDoS."
},

{
  id: "smilodox",
  name: "Smilodox",
  description: "Sports fashion.",
  assets: "*.smilodox.com",
  status: "open",
  notes: "No social engineering. No DDoS."
},

{
  id: "finanztip",
  name: "Finanztip",
  description: "Finance tips.",
  assets: "*.finanztip.de",
  status: "open",
  notes: "No social engineering. No DDoS."
}

];

/* ===== Randomization Logic ===== */

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const premiumPrograms = programs.filter(p => p.premium);
const normalPrograms = shuffleArray(programs.filter(p => !p.premium));
const sortedPrograms = [...premiumPrograms, ...normalPrograms];

/* ===== Render ===== */

const programsEl = document.getElementById("programs");

sortedPrograms.forEach(p => {

  const wrap = document.createElement("div");
  wrap.className = "card program";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = p.name.split(" ").map(s=>s[0]).slice(0,2).join("").toUpperCase();

  const body = document.createElement("div");
  body.style.flex = "1";

  const title = document.createElement("h3");
  title.textContent = p.name;

  if (p.premium) {
    const badge = document.createElement("span");
    badge.className = "premium-badge";
    badge.textContent = "PREMIUM";
    title.appendChild(badge);
  }

  const statusDiv = document.createElement("div");
  const dot = document.createElement("span");
  dot.className = "status-dot status-" + p.status;

  const statusText = document.createElement("span");
  statusText.textContent = p.status.charAt(0).toUpperCase() + p.status.slice(1);

  statusDiv.appendChild(dot);
  statusDiv.appendChild(statusText);

  const desc = document.createElement("div");
  desc.textContent = p.description;
  desc.style.color = "#b2c2d6";
  desc.style.marginTop = "4px";

  const details = document.createElement("div");
  details.className = "details";
  details.innerHTML = `
    <div><strong>Assets:</strong> ${p.assets}</div>
    <div style="margin-top:6px;"><strong>Notes:</strong> ${p.notes}</div>
  `;

  const detailsBtn = document.createElement("button");
  detailsBtn.className = "small outline";
  detailsBtn.textContent = "Details";
  detailsBtn.onclick = () => {
    details.classList.toggle("open");
    detailsBtn.textContent = details.classList.contains("open") ? "Hide" : "Details";
  };

  const reportBtn = document.createElement("a");
  reportBtn.className = "small danger";
  reportBtn.href = "https://github.com/cybrmakr/bugs/security/advisories/new";
  reportBtn.target = "_blank";
  reportBtn.rel = "noopener noreferrer";
  reportBtn.textContent = "Report";

  const actionDiv = document.createElement("div");
  actionDiv.style.marginTop = "10px";
  actionDiv.appendChild(detailsBtn);
  actionDiv.appendChild(reportBtn);

  body.appendChild(title);
  body.appendChild(statusDiv);
  body.appendChild(desc);
  body.appendChild(details);
  body.appendChild(actionDiv);

  wrap.appendChild(avatar);
  wrap.appendChild(body);

  programsEl.appendChild(wrap);

});

</script>

</body>
</html>
